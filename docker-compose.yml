services:
  app:
    build: .
    container_name: diamond-app
    environment:
      DB_HOST: ${DB_HOST:-mariadb}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-diamond_inventory}
      PORT: 3001
    volumes:
      - ./excel:/app/excel
      - frontend_dist:/app/frontend-dist
    networks:
      - web-network
    restart: always

volumes:
  frontend_dist:

networks:
  web-network:
    external: true
